name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate .env files on EC2
        uses: appleboy/ssh-action@v1
        env:
          APP_ENV_CONTENT: ${{ vars.APP_ENV }}
          DOCKER_ENV_CONTENT: ${{ vars.DOCKER_ENV }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: APP_ENV_CONTENT,DOCKER_ENV_CONTENT
          script: |
            printf '%s' "$APP_ENV_CONTENT" > /home/ubuntu/questionnaire/.env
            printf '%s' "$DOCKER_ENV_CONTENT" > /home/ubuntu/questionnaire/docker.env

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/questionnaire

            docker compose -f docker-compose.prod.yaml pull

            docker compose -f docker-compose.prod.yaml up -d

            docker image prune -f
